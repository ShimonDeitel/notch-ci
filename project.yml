name: Notch
options:
  bundleIdPrefix: com.shimondeitel.notch
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Notch:
    type: application
    platform: iOS
    sources:
      - path: Notch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.notch
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Notch/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  NotchTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: NotchTests
      - path: Notch.storekit
    dependencies:
      - target: Notch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.notch.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  NotchUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: NotchUITests
    dependencies:
      - target: Notch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.notch.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Notch:
    build:
      targets:
        Notch: all
        NotchTests: [test]
        NotchUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Notch.storekit
    test:
      config: Debug
      storeKitConfiguration: Notch.storekit
      targets:
        - NotchTests
        - NotchUITests
    archive:
      config: Release
